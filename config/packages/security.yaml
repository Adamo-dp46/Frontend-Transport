security:
    # https://symfony.com/doc/current/security.html#registering-the-user-hashing-passwords
    # password_hashers: -- Vu qu'on utilise notre 'ApiUser' et non une entité Doctrine
        # Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

    # https://symfony.com/doc/current/security.html#loading-the-user-the-user-provider
    providers:
        # users_in_memory: { memory: null }
        api_user_provider:
            id: App\Security\ApiUserProvider

    firewalls:
        dev:
            # Ensure dev tools and static assets are always allowed
            pattern: ^/(_profiler|_wdt|assets|build)/
            security: false
        main:
            lazy: true
            provider: api_user_provider
            custom_authenticator: App\Security\ApiAuthenticator

            logout:
                path: app_logout
                # success_handler: App\Security\LogoutSuccessHandler -- Va nettoyer notre session api via le service
                # where to redirect after logout
                # target: app_any_route

            remember_me:
                secret: '%kernel.secret%'
                lifetime: 2592000 # Pour 30j ou '604800' par défaut 7j
                path: /
                httponly: true
                secure: true # Ou 'auto' pour activer le cookie uniquement sur 'HTTPS'
                samesite: lax
                # always_remember_me: true -- Pour se passer du checkbox dans le form
                # remember_me_parameter: '_remember_me'
                # signature_properties: ['email'] -- Si on veut utiliser l'email au lieu du password pour signer le cookie qui est accessible via le 'getUserIdentifier()' de 'ApiUser'

                # by default, the feature is enabled by checking a checkbox in the
                # login form, uncomment the following line to always enable it.
                #always_remember_me: true

            # Activate different ways to authenticate:
            # https://symfony.com/doc/current/security.html#the-firewall

            # https://symfony.com/doc/current/security/impersonating_user.html
            # switch_user: true

    # Note: Only the *first* matching rule is applied
    access_control:
        # - { path: ^/admin, roles: ROLE_ADMIN }
        # - { path: ^/profile, roles: ROLE_USER }

when@test:
    security:
        password_hashers:
            # Password hashers are resource-intensive by design to ensure security.
            # In tests, it's safe to reduce their cost to improve performance.
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4 # Lowest possible value for bcrypt
                time_cost: 3 # Lowest possible value for argon
                memory_cost: 10 # Lowest possible value for argon
